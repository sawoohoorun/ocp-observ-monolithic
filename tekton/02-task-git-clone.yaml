---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone-demo-repo
  namespace: observability-demo
  labels:
    app.kubernetes.io/part-of: observability-demo
spec:
  description: Clone the monorepo (frontend-ui, backend-app, openshift) into the shared workspace.
  stepTemplate:
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
  params:
    - name: url
      description: Git repository URL (HTTPS or SSH if cluster supports it)
      type: string
    - name: revision
      description: Branch, tag, or commit to check out after clone
      type: string
      default: main
  workspaces:
    - name: output
      description: Empty workspace; repository root is placed here
  steps:
    - name: clone
      # Git baked in; runs without root (required for PSA restricted / runAsNonRoot).
      image: docker.io/alpine/git:v2.45.2
      script: |
        #!/bin/sh
        set -eu
        # Writable HOME for gitconfig; safe.directory avoids "dubious ownership" when workspace
        # UID differs from the step user (Tekton emptyDir / fsGroup).
        export HOME=/tmp/git-home
        mkdir -p "$HOME"
        git config --global --add safe.directory '*'
        cd "$(workspaces.output.path)"
        rm -rf ./* ./.??* 2>/dev/null || true
        git clone "$(params.url)" .
        git checkout "$(params.revision)"
        echo "Cloned $(params.url) at $(git rev-parse --short HEAD)"
