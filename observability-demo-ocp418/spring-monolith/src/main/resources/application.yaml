server:
  port: 8080

spring:
  application:
    name: demo-monolith

demo:
  internal-base-url: http://127.0.0.1:8080

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://otel-collector.observability-demo.svc.cluster.local:4318/v1/traces
