server:
  port: 8080

spring:
  application:
    name: order-demo-app
  datasource:
    url: jdbc:postgresql://postgres.observability-single-span.svc.cluster.local:5432/demodb
    username: demo
    password: ${DB_PASSWORD:demo}
    hikari:
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
