---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: frontend-ui
  namespace: observability-single-span
  labels:
    app.kubernetes.io/name: frontend-ui
    app.kubernetes.io/part-of: observability-single-span
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: frontend-ui
  namespace: observability-single-span
  labels:
    app.kubernetes.io/name: frontend-ui
    app.kubernetes.io/part-of: observability-single-span
spec:
  successfulBuildsHistoryLimit: 5
  failedBuildsHistoryLimit: 5
  runPolicy: Serial
  source:
    type: Git
    git:
      uri: https://github.com/sawoohoorun/ocp-observ-monolithic.git
      ref: auto-instrumentation
    contextDir: frontend-ui
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: frontend-ui:1.0.0
  triggers:
    - type: ConfigChange
