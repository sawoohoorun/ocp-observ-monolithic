---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: observability-demo
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: observability-demo
type: Opaque
stringData:
  password: demopass-demo-lab-only
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: observability-demo
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: observability-demo
data:
  001-init.sql: |
    CREATE TABLE orders (
      id VARCHAR(64) PRIMARY KEY,
      customer VARCHAR(255) NOT NULL,
      amount_cents BIGINT NOT NULL
    );
    CREATE TABLE inventory (
      sku VARCHAR(64) PRIMARY KEY,
      qty INT NOT NULL,
      warehouse VARCHAR(128) NOT NULL
    );
    CREATE TABLE pricing (
      sku VARCHAR(64) PRIMARY KEY,
      cents BIGINT NOT NULL
    );
    INSERT INTO orders VALUES ('ORD-001', 'Acme Corp', 12999);
    INSERT INTO inventory VALUES ('SKU-100', 42, 'WH-EAST');
    INSERT INTO pricing VALUES ('SKU-100', 999);
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: observability-demo
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: observability-demo
spec:
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: observability-demo
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: observability-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: observability-demo
    spec:
      # Omit fsGroup so restricted-v2 can assign a namespace-allowed supplemental group (fixed GIDs e.g. 70 fail SCC).
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: docker.io/library/postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: demo
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: POSTGRES_DB
              value: demodb
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U demo -d demodb -h 127.0.0.1
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U demo -d demodb -h 127.0.0.1
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
      volumes:
        - name: data
          emptyDir: {}
        - name: init
          configMap:
            name: postgres-init
