<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title th:text="${action}">Result</title>
  <style>
    body { font-family: monospace; margin: 2rem; }
    pre { background: #f4f4f4; padding: 1rem; overflow: auto; }
    a { color: #0066cc; }
  </style>
</head>
<body>
<h1 th:text="${action}">Action</h1>
<p th:if="${ok}">Backend response:</p>
<p th:unless="${ok}">Error calling backend:</p>
<pre th:text="${body}"></pre>
<p><a th:href="@{/}">← Back</a></p>
</body>
</html>
