server:
  port: 8080

spring:
  application:
    name: order-demo-app
  thymeleaf:
    cache: false

demo:
  backend-base-url: http://backend-app.observability-single-span.svc.cluster.local:8080

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
